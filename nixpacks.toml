[phases.setup]
nixPkgs = [
  'php83',
  'php83Packages.composer',
  'php83Extensions.pdo',
  'php83Extensions.pdo_mysql',
  'php83Extensions.pdo_pgsql',
  'php83Extensions.mbstring',
  'php83Extensions.openssl',
  'php83Extensions.tokenizer',
  'php83Extensions.xml',
  'php83Extensions.ctype',
  'php83Extensions.json',
  'php83Extensions.bcmath',
  'php83Extensions.dom',
  'php83Extensions.fileinfo',
  'php83Extensions.curl',
  'php83Extensions.zip',
  'php83Extensions.gd',
]

[phases.build]
cmds = ['composer install --no-dev --optimize-autoloader']

[start]
cmd = 'php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=$PORT'
